  --navy-dark:     #091739;
  --gold:          #F5B800;
  --gold-hover:    #D9A300;
  --white:         #FFFFFF;
  --border-navy:   rgba(255,255,255,0.09);
}

.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: rgba(9, 23, 57, 0.97);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-navy);
  transition: background 0.3s, box-shadow 0.3s;
}
.navbar.scrolled {
  background: rgba(9, 23, 57, 0.99);
  box-shadow: 0 4px 32px rgba(12,31,74,0.45);
}
.navbar .container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 32px;
  display: flex; align-items: center; justify-content: space-between; height: 68px;
}
.navbar-logo img { height: 34px; width: auto; display: block; }
.navbar-links { display: flex; gap: 32px; list-style: none; margin: 0; padding: 0; }
.navbar-links a {
  color: rgba(255,255,255,0.58); text-decoration: none;
  font-family: 'Inter', sans-serif;
  font-size: 14px; font-weight: 500;
  transition: color 0.15s; letter-spacing: 0.01em;
}
.navbar-links a:hover { color: #FFFFFF; }
.navbar .btn {
  display: inline-flex; align-items: center;
  padding: 9px 20px; border-radius: 6px;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  text-decoration: none; cursor: pointer;
  transition: all 0.18s ease; white-space: nowrap;
  border: 2px solid transparent; letter-spacing: -0.01em;
  background: var(--gold); color: var(--navy-dark); border-color: var(--gold);
}
.navbar .btn:hover { background: var(--gold-hover); border-color: var(--gold-hover); }

/* ── Strip Squarespace code block padding ── */
.sqs-block-code,
.sqs-block-content { padding: 0 !important; margin: 0 !important; }
</style>

<script>
(function() {
  var navbar = document.getElementById('ac-navbar');
  if (!navbar) return;
  window.addEventListener('scroll', function() {
    navbar.classList.toggle('scrolled', window.scrollY > 60);
  }, { passive: true });
})();
</script>
